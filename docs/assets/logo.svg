<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="bento">
  <!-- ─────────────────────────────────────────────────────────
       Icon: bento box (96×96), with compartments filled by
       terminal-themed glyphs. Slate foreground (#334155) reads
       cleanly on white AND on GitHub's dark-mode near-black.
       ───────────────────────────────────────────────────────── -->
  <g stroke="#334155" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer box -->
    <rect x="8" y="8" width="80" height="80" rx="8"/>
    <!-- horizontal divider: top-half = "main dish", bottom-half = sides -->
    <line x1="8" y1="44" x2="88" y2="44"/>
    <!-- vertical dividers in the bottom half: three side compartments -->
    <line x1="35" y1="44" x2="35" y2="88"/>
    <line x1="61" y1="44" x2="61" y2="88"/>
  </g>

  <!-- Top compartment (x 8→88, centered on 48,26):
       chevron prompt + green cursor + trailing dots. -->
  <path d="M 22 21 L 30 27 L 22 33"
        stroke="#334155" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="35" y="20" width="12" height="14" rx="1.5" fill="#10b981"/>
  <circle cx="56" cy="27" r="2" fill="#334155"/>
  <circle cx="64" cy="27" r="2" fill="#334155"/>
  <circle cx="72" cy="27" r="2" fill="#334155" opacity="0.45"/>

  <!-- Bottom-left (x 8→35, centered on 21.5,66):
       curly braces, pair centered on the compartment axis, with
       4 units of clear air from both the outer wall and the
       internal divider. -->
  <g stroke="#334155" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 18 58 Q 14 58 14 62 L 14 64 Q 14 66 12 66 Q 14 66 14 68 L 14 70 Q 14 74 18 74"/>
    <path d="M 25 58 Q 29 58 29 62 L 29 64 Q 29 66 31 66 Q 29 66 29 68 L 29 70 Q 29 74 25 74"/>
  </g>

  <!-- Bottom-middle (x 35→61, centered on 48,66):
       three equal-length bars = config/data. -->
  <g stroke="#334155" stroke-width="2.5" stroke-linecap="round">
    <line x1="41" y1="60" x2="55" y2="60"/>
    <line x1="41" y1="66" x2="55" y2="66"/>
    <line x1="41" y1="72" x2="55" y2="72"/>
  </g>

  <!-- Bottom-right (x 61→88, centered on 74.5,66):
       run triangle. Slightly left-biased centroid is correct —
       the eye reads a rightward-pointing triangle as right-weighted
       so the flat side sits left of the geometric midpoint. -->
  <path d="M 68 58 L 81 66 L 68 74 Z" fill="#10b981" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ─────────────────────────────────────────────────────────
       Wordmark: "bento" in monospace, slate.
       ───────────────────────────────────────────────────────── -->
  <text x="108" y="63"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="48" font-weight="700" fill="#334155"
        letter-spacing="-1.5">bento</text>
</svg>
