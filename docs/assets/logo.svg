<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="bento">
  <!--
    Light-theme wordmark. Grid mark + sans-serif "bento" in ink-950.
    Mark ported from bento-cloud/marketing/src/components/logos.tsx
    (variant="grid" — the canonical PRIMARY mark per
    marketing/src/pages/Logos.tsx). Palette: nori-500 #6aa877 (rice
    compartment, accent), ink-950 #1a1814 (foreground / wordmark).
  -->

  <!-- Mark (96×96 area, top-left of the viewBox). -->
  <rect x="4.5" y="4.5" width="87" height="87" rx="15" fill="none" stroke="#1a1814" stroke-width="4.5"/>
  <rect x="15" y="15" width="30" height="66" rx="6" fill="#6aa877"/>
  <rect x="51" y="15" width="30" height="30" rx="6" fill="#1a1814" fill-opacity="0.9"/>
  <rect x="51" y="51" width="13.5" height="30" rx="4.5" fill="#1a1814" fill-opacity="0.6"/>
  <rect x="67.5" y="51" width="13.5" height="30" rx="4.5" fill="#1a1814" fill-opacity="0.3"/>

  <!-- Wordmark "bento" — Geist family with broad fallbacks for the
       GitHub README renderer (which doesn't ship Geist). -->
  <text x="112" y="64"
        font-family="'Geist Variable', 'Geist', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="600" fill="#1a1814"
        letter-spacing="-2">bento</text>
</svg>
