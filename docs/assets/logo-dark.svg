<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="bento">
  <!--
    Dark-theme wordmark. Mirror of logo.svg with stroke + non-accent
    fills swapped to paper-cream (ink-50 #f2eee8) for legibility on
    dark backgrounds. Accent stays nori-500 #6aa877 — works on both.
  -->

  <!-- Mark (96×96 area, top-left of the viewBox). -->
  <rect x="4.5" y="4.5" width="87" height="87" rx="15" fill="none" stroke="#f2eee8" stroke-width="4.5"/>
  <rect x="15" y="15" width="30" height="66" rx="6" fill="#6aa877"/>
  <rect x="51" y="15" width="30" height="30" rx="6" fill="#f2eee8" fill-opacity="0.9"/>
  <rect x="51" y="51" width="13.5" height="30" rx="4.5" fill="#f2eee8" fill-opacity="0.6"/>
  <rect x="67.5" y="51" width="13.5" height="30" rx="4.5" fill="#f2eee8" fill-opacity="0.3"/>

  <!-- Wordmark "bento". -->
  <text x="112" y="64"
        font-family="'Geist Variable', 'Geist', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="600" fill="#f2eee8"
        letter-spacing="-2">bento</text>
</svg>
