<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="bento">
  <!--
    Grid mark — the literal bento box. One rice compartment (left,
    nori-green) plus four sides (top-right square + two bottom-right
    bars at descending opacity). Ported from the canonical mark in
    bento-cloud/marketing/src/components/logos.tsx (variant="grid",
    described in marketing/src/pages/Logos.tsx as PRIMARY).
    Palette: nori-500 #6aa877 (accent), ink-950 #1a1814 (foreground).
  -->
  <rect x="4.5" y="4.5" width="87" height="87" rx="15" fill="none" stroke="#1a1814" stroke-width="4.5"/>
  <rect x="15" y="15" width="30" height="66" rx="6" fill="#6aa877"/>
  <rect x="51" y="15" width="30" height="30" rx="6" fill="#1a1814" fill-opacity="0.9"/>
  <rect x="51" y="51" width="13.5" height="30" rx="4.5" fill="#1a1814" fill-opacity="0.6"/>
  <rect x="67.5" y="51" width="13.5" height="30" rx="4.5" fill="#1a1814" fill-opacity="0.3"/>
</svg>
