name: E2E

# Dedicated workflow for the end-to-end test suite. Separate from
# `ci.yml` (unit + clippy + fmt + cross-build) because e2e is:
#   - Fatter: installs every toolchain, pulls container images.
#   - Slower: the release-profile bento binary + real `go build` /
#     `pnpm install` / `cargo build` / ... per fixture.
#   - Higher-variance: toolchain-installer flakiness, public registry
#     pulls. Keeping it separate means `ci.yml` stays the badge that
#     gates merges; this workflow surfaces richer regressions.

on:
  push:
    branches: [main]
    # Patch tags + prereleases only — floating major-minor tags
    # (`v0.1`, `v1.0`) are retargeted by `release.yml` after the
    # patch publishes and shouldn't re-trigger full-matrix.
    tags: ['v*.*.*']
  pull_request:
  # Manual trigger for full-matrix without cutting a tag — lets us
  # exercise the expensive job after fixing a regression without
  # bumping the release train.
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run full-matrix (ignore tag gate)'
        type: boolean
        default: true

permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new push lands —
# saves runner minutes on rapid iteration. Tag pushes still keep
# their own concurrency group via `${{ github.ref }}` so releases
# never cancel each other; only ref-on-ref pushes (e.g. consecutive
# main commits) interrupt their predecessor.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── PR gate ────────────────────────────────────────────────────
  # Runs on every PR + push to main. Small toolchain footprint (Go +
  # Node + docker); tests for other ecosystems skip cleanly via
  # `require_toolchain`. No network-gated tests. Target < 2 min so
  # PR authors get fast feedback.
  pr-smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    # Skip on tag pushes — full-matrix below covers those and this
    # job would redundantly re-run a subset.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-pr-smoke

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false # rust-cache above owns target/; go toolchain's
                       # module cache is fine to rebuild each run.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # docker is preinstalled on ubuntu-latest — we rely on it for
      # the container-go smoke. Explicit version print helps when
      # debugging the occasional runner-image regression.
      - name: Docker sanity
        run: docker --version

      # The e2e harness materialises every fixture into a tempdir
      # and invokes the release-built bento binary. We build once
      # here + test once; rust-cache keeps target/ warm across runs.
      - name: cargo test --release --test e2e
        run: cargo test --release --test e2e --locked

  # ── Full matrix ────────────────────────────────────────────────
  # Runs on tag pushes only. Installs every toolchain the harness
  # knows about so no ecosystem skips, plus BENTO_E2E_NETWORK=1 so
  # the network-gated recipes (ruby / python-build / maven / gradle)
  # actually execute rather than emitting skip markers. Sole signal
  # we want before cutting a release.
  full-matrix:
    name: e2e full-matrix
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.full_matrix)
    env:
      BENTO_E2E_NETWORK: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-full-matrix

      # Go.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # Node + the three package managers bento ships adapters for.
      # setup-node handles npm; pnpm / yarn are explicit.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - name: Install yarn
        run: npm install --global yarn

      # Bun + Deno.
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # Python + the `build` frontend so python-build fixture's
      # network-gated tests pass rather than skip.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python build
        run: python -m pip install --upgrade pip build

      # Ruby + bundler for rubygems-fetching tests.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false # fixture writes its own Gemfile;
                               # bundler install happens per test

      # PHP + Composer.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      # Java (for Maven + Gradle).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Maven
        run: |
          if ! command -v mvn >/dev/null; then
            sudo apt-get update && sudo apt-get install -y maven
          fi
          mvn -version

      - name: Docker sanity
        run: docker --version

      - name: cargo test --release --test e2e
        run: cargo test --release --test e2e --locked
